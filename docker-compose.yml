services:
  litewebui:
    build: .
    image: litewebui:latest
    container_name: litewebui
    restart: unless-stopped
    ports:
      - "3050:3050"
    environment:
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      # SHA-256 hex — default is hash of "changeme"
      AUTH_PASSWORD: ${AUTH_PASSWORD:-057ba03d6c44104863dc7361fe4578965d1887360f90a0895882e58a6248fc86}
      NINEROUTER_BASE_URL: ${NINEROUTER_BASE_URL:-http://host.docker.internal:20128/v1}
      NINEROUTER_API_KEY: ${NINEROUTER_API_KEY:-}
      DATA_DIR: /data
      LISTEN: ":3050"
    volumes:
      - litewebui-data:/data

volumes:
  litewebui-data:
