<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f10" />
  <meta name="color-scheme" content="dark light" />
  <title>litewebui</title><!-- litewebui-build-42 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css?v=42" />
  <link rel="icon" href="/favicon.svg" />
</head>
<body>
  <!-- Login -->
  <div id="login" class="login">
    <div class="login-card">
      <div class="login-logo" aria-hidden="true"><img class="ds-logo-img" src="/favicon.svg" alt="litewebui" width="28" height="28" /></div>
      <h1>litewebui</h1>
      <p class="login-sub">Sign in to litewebui</p>
      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter Your Username" required />
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter Your Password" autofocus required />
        <button type="submit" class="btn-primary block">Sign in</button>
        <p id="login-err" class="err"></p>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sb-top">
        <div class="sb-brand">
          <div class="sb-logo" aria-hidden="true"><img class="ds-logo-img" src="/favicon.svg" alt="litewebui" width="28" height="28" /></div>
          <span class="sb-name">litewebui</span>
          <button type="button" id="btn-sidebar-close" class="icon-btn sb-panel-btn" title="Close sidebar" aria-label="Close sidebar">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
              <rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/>
              <path d="M9.5 4.5v15"/>
            </svg>
          </button>
        </div>
        <button type="button" id="btn-new" class="sb-new-chat">
          <svg class="sb-new-ico" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/>
            <path stroke-linecap="round" d="M12 8v8M8 12h8"/>
          </svg>
          <span>New chat</span>
        </button>
</div>

      <div class="sb-section">
        <div id="pinned-block" class="chat-group hidden">
          <button type="button" class="group-toggle" data-group="pinned" aria-expanded="true">
            <span class="group-label">Pinned</span>
            <svg class="group-chev" viewBox="0 0 20 20" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
          </button>
          <div id="pinned-list" class="conv-list conv-list-nested group-body"></div>
        </div>

        <div id="recents-block" class="chat-group">
          <button type="button" class="group-toggle" data-group="recents" aria-expanded="true">
            <span class="group-label">Recents</span>
            <svg class="group-chev" viewBox="0 0 20 20" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
          </button>
          <div id="conv-list" class="conv-list group-body"></div>
        </div>

        <div id="archived-block" class="chat-group hidden">
          <button type="button" class="group-toggle" data-group="archived" aria-expanded="true">
            <span class="group-label">Archived</span>
            <svg class="group-chev" viewBox="0 0 20 20" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
          </button>
          <div id="archived-list" class="conv-list conv-list-nested group-body"></div>
        </div>
      </div>

      <div class="sb-bottom">
        <button type="button" id="btn-settings" class="user-row">
          <span class="user-av">A</span>
          <span class="user-meta">
            <span class="user-name">Admin</span>
            <span class="user-role">Settings</span>
          </span>
          <svg class="chev" viewBox="0 0 20 20" width="16" height="16" fill="currentColor"><path d="M5.23 7.21a.75.75 0 011.06.02L10 11.17l3.71-3.94a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"/></svg>
        </button>
        <button type="button" id="btn-logout" class="sb-logout">Sign out</button>
      </div>
    </aside>

    <div class="main-wrap">
      <nav class="navbar">
        <button type="button" id="btn-menu" class="icon-btn sb-panel-btn" title="Open sidebar" aria-label="Open sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
            <rect x="3.5" y="4.5" width="17" height="15" rx="2.5"/>
            <path d="M9.5 4.5v15"/>
          </svg>
        </button>
        <div class="model-selector">
          <select id="model" title="Model"></select>
        </div>
        <div class="nav-right"></div>
      </nav>

      <div id="messages" class="messages">
        <div id="empty" class="empty">
          <div class="empty-inner">
            <div class="empty-hero">
              <div class="empty-avatar" id="empty-avatar"><img class="ds-logo-img" src="/favicon.svg" alt="" /></div>
              <div class="empty-title" id="empty-title">litewebui</div>
            </div>
            <div class="empty-sub">What do you need?</div>
          </div>
        </div>
      </div>

      <footer class="composer">
        <div id="attach-preview" class="attach-preview hidden"></div>
        <div class="composer-box">
          <input type="file" id="file-input" class="hidden" multiple />
          <button type="button" id="btn-attach" class="icon-btn attach-btn" title="Upload image or file" aria-label="Attach">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6"><path stroke-linecap="round" stroke-linejoin="round" d="M18.375 12.739l-7.693 7.693a4.5 4.5 0 01-6.364-6.364l10.94-10.94A3 3 0 1119.5 8.25l-10.94 10.94a1.5 1.5 0 11-2.121-2.121l7.773-7.773"/></svg>
          </button>
          <textarea id="input" rows="1" placeholder="What do you need?"></textarea>
          <div class="composer-actions">
            <button type="button" id="btn-send" class="send-btn" title="Send" aria-label="Send">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-6 6m6-6l6 6"/></svg>
            </button>
          </div>
        </div>
        <p class="disclaimer">LLMs can make mistakes. Check important info.</p>
      </footer>
    </div>
  </div>

    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-card settings-card">
      <div class="modal-head">
        <h2 id="settings-title">Settings</h2>
        <button type="button" id="btn-settings-close" class="icon-btn" aria-label="Close">X</button>
      </div>
      <div class="settings-layout">
        <nav class="settings-nav" aria-label="Settings sections">
          <button type="button" class="settings-nav-btn active" data-panel="general" id="nav-general">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317a1.724 1.724 0 013.35 0 1.724 1.724 0 002.573 1.066 1.724 1.724 0 012.37 2.37 1.724 1.724 0 001.065 2.572 1.724 1.724 0 010 3.35 1.724 1.724 0 00-1.066 2.573 1.724 1.724 0 01-2.37 2.37 1.724 1.724 0 00-2.572 1.065 1.724 1.724 0 01-3.35 0 1.724 1.724 0 00-2.573-1.066 1.724 1.724 0 01-2.37-2.37 1.724 1.724 0 00-1.065-2.572 1.724 1.724 0 010-3.35 1.724 1.724 0 001.066-2.573 1.724 1.724 0 012.37-2.37 1.724 1.724 0 002.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
            <span>General</span>
          </button>
          <button type="button" class="settings-nav-btn" data-panel="api" id="nav-api">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L21 12l-3.75 5.25M6.75 17.25L3 12l3.75-5.25M14.25 4.5l-4.5 15"/></svg>
            <span>API</span>
          </button>
        </nav>
        <div class="settings-panels">
          <div class="settings-panel" id="panel-general" data-panel="general">
            <div class="settings-field-label">Theme</div>
            <div class="theme-cards" role="radiogroup" aria-label="Theme">
              <button type="button" class="theme-card" data-theme="light" id="theme-light">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5.05 5.05l1.4 1.4M17.55 17.55l1.4 1.4M5.05 18.95l1.4-1.4M17.55 6.45l1.4-1.4"/></svg>
                <span>Light</span>
              </button>
              <button type="button" class="theme-card" data-theme="dark" id="theme-dark">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M21 14.5A8.5 8.5 0 1110.5 3a7 7 0 0010.5 11.5z"/></svg>
                <span>Dark</span>
              </button>
              <button type="button" class="theme-card" data-theme="system" id="theme-system">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="3.5" y="4.5" width="17" height="12" rx="2"/><path stroke-linecap="round" d="M8 20h8M12 16.5V20"/></svg>
                <span>System</span>
              </button>
            </div>
          </div>
          <div class="settings-panel hidden" id="panel-api" data-panel="api">
            <form id="settings-form">
              <label for="set-base">API Endpoint</label>
              <input type="url" id="set-base" required placeholder="https://api.example.com/v1" />
              <p class="hint">OpenAI-compatible base URL (…/v1)</p>
              <label for="set-key">API Key</label>
              <input type="password" id="set-key" placeholder="Leave empty to keep current" autocomplete="off" />
              <p id="set-key-hint" class="hint"></p>
              <div class="form-actions">
                <button type="button" id="btn-test-conn" class="btn-secondary">Test Connection</button>
                <button type="submit" class="btn-primary">Save</button>
              </div>
              <p id="settings-msg" class="err"></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>


  <div id="confirm-modal" class="modal confirm-modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal-card confirm-card">
      <h3 id="confirm-title" class="confirm-title">Are you sure you want to delete this?</h3>
      <p id="confirm-sub" class="confirm-sub">This chat can't be recovered.</p>
      <input id="confirm-input" class="confirm-input hidden" type="text" autocomplete="off" spellcheck="false" />
      <div class="confirm-actions">
        <button type="button" id="confirm-cancel" class="btn-confirm-cancel">Cancel</button>
        <button type="button" id="confirm-ok" class="btn-confirm-danger">Delete chat</button>
      </div>
    </div>
  </div>
  <div id="sidebar-backdrop" class="backdrop hidden"></div>
  <div id="conv-menu" class="conv-menu hidden" role="menu"></div>
  <script src="/app.js?v=42"></script>
</body>
</html>
